<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-SIEM Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <div class="logo">
                <span class="shield">🛡️</span>
                <h1>Mini-SIEM <span class="badge">Live</span></h1>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <span class="stat-label">Events Processed</span>
                    <span class="stat-value" id="total-logs">0</span>
                </div>
                <div class="stat-box alert-box">
                    <span class="stat-label">Security Alerts</span>
                    <span class="stat-value" id="total-alerts">0</span>
                </div>
            </div>
        </header>

        <main>
            <section class="panel alerts-panel">
                <div class="panel-header">
                    <h2>Active Threats & Alerts</h2>
                    <div class="pulse-indicator"></div>
                </div>
                <div class="table-container">
                    <table id="alerts-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Rule</th>
                                <th>Source IP</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody id="alerts-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="panel logs-panel">
                <div class="panel-header">
                    <h2>Live Access Logs</h2>
                </div>
                <div class="table-container">
                    <table id="logs-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Status</th>
                                <th>Method</th>
                                <th>URL</th>
                                <th>IP Address</th>
                            </tr>
                        </thead>
                        <tbody id="logs-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Alert Action Modal -->
    <div id="alert-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Alert Action Required</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <p><strong>Rule:</strong> <span id="modal-rule"></span></p>
                <p><strong>Source IP:</strong> <span id="modal-ip"></span></p>
                <p><strong>Description:</strong> <span id="modal-desc"></span></p>
                <input type="hidden" id="modal-alert-id">
            </div>
            <div class="modal-actions">
                <button id="btn-dismiss" class="btn btn-secondary">Dismiss Alert</button>
                <button id="btn-ban" class="btn btn-danger">Ban IP</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
